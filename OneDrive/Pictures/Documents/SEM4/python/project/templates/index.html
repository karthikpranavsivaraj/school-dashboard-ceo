<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Auction Room</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .highest-bid-box {
            background-color: #e9ffe8;
            border-left: 5px solid #28a745;
            padding: 20px;
            margin-bottom: 20px;
        }
        .highest-bid-box h3 {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-center">🔥 Live Auction Room</h2>

    <div class="row mb-4">
        <div class="col-md-6">
            <label class="form-label">Your Name</label>
            <input type="text" id="user" class="form-control" placeholder="Enter your name">
        </div>
        <div class="col-md-6">
            <label class="form-label">Bid Amount (₹)</label>
            <input type="number" id="amount" class="form-control" placeholder="Enter bid amount">
        </div>
    </div>

    <div class="mb-4">
        <button class="btn btn-success me-2" onclick="submitBid()">Place Bid</button>
        <button class="btn btn-danger" onclick="resetBids()">Reset All</button>
    </div>

    <div class="highest-bid-box">
        <h3>Highest Bid: ₹<span id="highest-bid">0</span></h3>
    </div>

    <h4 class="mt-4">📋 All Bids</h4>
    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Bidder</th>
                    <th>Amount (₹)</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="bid-list">
                <!-- Bids will appear here -->
            </tbody>
        </table>
    </div>
</div>
<script src="/static/main.js"></script>

</body>
</html>
