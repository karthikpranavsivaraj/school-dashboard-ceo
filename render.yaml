services:
  # Backend Service (Express)
  - type: web
    name: school-ceo-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # User must provide their MongoDB Atlas URI
      - key: GROQ_API_KEY
        sync: false # User must provide their Groq API Key
      - key: JWT_SECRET
        sync: false # User must provide a secure secret
      - key: FRONTEND_URL
        sync: false # User must provide their Vercel Deployment URL
